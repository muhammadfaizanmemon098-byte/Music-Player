<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player | Muhammad Faizan Memon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="player">
        <img id="cover" src="" alt="song cover">

        <h2 id="title">song name</h2>
        <p id="artist">Artist name</p>
        <audio id="audio"></audio>

        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>

        <p id="time">0:00 / 0:00</p>

        <input type="range" id="progress" value="0" min="0" max="100">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        <ul id="playlist">
            <li onclick="selectsong(0)">Love me like you do</li>
            <li onclick="selectsong(1)">Tu hi Haqeqt </li>
            <li onclick="selectsong(2)">Let me Down sad </li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
